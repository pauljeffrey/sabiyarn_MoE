
training: 
  train_batch_size : 8
  out_dir : "out"
  eval_interval : 20
  log_interval : 100
  eval_iters : 200
  eval_only : false  # if True, script exits right after the first eval
  always_save_checkpoint : false  # if True, always save a checkpoint after each eval
  gradient_accumulation_steps : 40  # used to simulate larger batch sizes (was 5 * 8)
  decay_lr : True  # whether to decay the learning rate
  warmup_iters : 20  # how many steps to warm up for
  lr_decay_iters : 5000  # should be ~: max_iters per Chinchilla
  min_lr : 6e-5  # minimum learning rate, should be ~: learning_rate/10 per Chinchilla
  compile : true  # use PyTorch 2.0 to compile the model to be faster
  display_model_output_iter : 128
  use_cce : false  # to use cut cross entropy or not
  scheduler: "cosine"
  block_size: 4096
  dtype: "bf16"
  # init_from controls MODEL WEIGHTS only: "hf" pulls model.repo_name from the
  # HF Hub; "resume" loads the latest local checkpoint's weights instead (see
  # resume_run_dir below). Regardless of this setting, optimizer state,
  # iter_num, best_val, and (since they're pure functions of iter_num) the LR
  # and dynamic sampling-ratio schedules ALWAYS auto-resume from the latest
  # checkpoint when one exists -- e.g. init_from: "hf" still continues the
  # step count/optimizer momentum from a prior local run while pulling fresh
  # weights, which is intentional for continuous pretraining across Modal
  # container restarts.
  init_from: "hf"  # hf (HuggingFace hub) | resume (local ckpt)
  # Optional explicit override; leave blank to auto-discover the most recent
  # matching run directory under training.out_dir (works the same on a Modal
  # Volume, a vast.ai instance's local disk, or your own machine -- purely a
  # filesystem scan, no platform-specific logic -- as long as out_dir points
  # at somewhere that actually persists across restarts there).
  resume_run_dir: ""
  mode: "pretrain"  # pretrain | sft
  hf_chkpt_path: "Aletheia-ng/SabiYarn_MoE_base"
  schedule_trainable_layers: false

tokenizer:
  name: BeardedMonster/SabiYarn-32k
  num_proc: 64
  process_one_file_at_a_time: true

model:
  repo_name: Aletheia-ng/SabiYarn_MoE_translate_base
  weights:
    freeze_experts_only: false
    freeze_pos_layer_only: false
    freeze_emb_layer_only: false
    freeze_router_layer_only: false
    freeze_ffn_layer_only: false
    freeze_attn_layer_only: false

s3:
  # Credentials are NOT stored here. Set S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
  # as env vars locally, or via the Modal "s3-secret" secret in production.
  s3_endpoint: https://usc1.contabostorage.com
  s3_bucket_name: sabiyarn-dataset

# wandb logging
wandb: 
  log : true  # disabled by default
  project : sabiyarn-ablations
  run_name : ablation_1  # 'run' + str(time.time())
  save_model_to_wandb: true
  seed: 42

# data
data: 
  pretrain_datasets: 
    african:
      - BeardeMonster/african_SFT
    english:
      - BeardedMonster/english_SFT
  sft_datasets:
    african: 
      - BeardedMonster/african_sft
    english:
      - BeardedMonster/eng_sft
  rl_datasets:
      - Aletheia-ng/tds-sft
  pretrain:
    - eng_train_data_path : "datasets/eng_training.bin"
    - afr_train_data_path : "datasets/training.bin"
    # TEMPORARY for smoke testing: validation.bin doesn't exist in the S3
    # bucket. Pointing eval at an existing training bin just unblocks the
    # pipeline check -- this is NOT a real held-out eval set. Restore to
    # "validation.bin" (or a real eval split) before actual training.
    - eval_data_path: "datasets/eng_training.bin"
  sft:
    - eng_train_data_path : "datasets/eng_sft_training.bin"
    - afr_train_data_path : "datasets/nigerian_sft_training.bin"
    - eval_data_path: "sft_validation.bin"
  sampling:
    - use_scheduled_sampling: false
    - afr_sampling_weight: 0.6
    - eng_sampling_weight: 0.4
 

# adamw optimizer
optimizer:
  name : "adam"
  learning_rate : 3e-4  # max learning rate
  max_iters : 5000  # total number of training iterations
  weight_decay : 1e-1
  beta1 : 0.9
  beta2 : 0.95
  grad_clip : 1.0  # clip gradients at this value, or disable if :: 0.0
  moe_aux_loss_weight: 0.01  # weight for MoE load-balancing auxiliary loss


# DDP settings
ddp:
  rank : 0
  backend : "nccl"
  use_dp: False

#Accelerate config
accelerate:
  mixed_precision: "bf16"
  fsdp_sharding_strategy: "FULL_SHARD"  # NO_SHARD | SHARD_GRAD_OP | FULL_SHARD | HYBRID_SHARD
  gradient_clipping: 1.0

env:
  world_size: 1
  rank: 0

modal:
  # gpu_type/gpus_per_node/num_nodes here ONLY configure Modal's
  # @app.function(gpu=...) parameter (training/modal_train.py) -- they have
  # no effect if you're running on vast.ai or any other bare GPU box instead.
  # There, you pick/rent the hardware yourself when provisioning the
  # instance, and gpus_per_node's number is just what you'd manually pass to
  # torchrun's --nproc_per_node (see HOW_TO_RUN.md's generic launch command).
  #
  # Valid gpu_type strings on Modal, with VRAM per GPU (confirmed against
  # Modal's own docs at https://modal.com/docs/guide/gpu; double check
  # modal.com/pricing for current availability/pricing before committing to
  # one, especially the newer/less common entries):
  #   T4            16 GB
  #   L4            24 GB
  #   A10           24 GB
  #   L40S          48 GB
  #   A100-40GB     40 GB  (also just "A100")
  #   A100-80GB     80 GB
  #   H100          80 GB  (also "H100!" -- a specific availability SKU)
  #   H200         141 GB
  #   RTX-PRO-6000  -- newer card, check current Modal docs for VRAM
  #   B200/B200+    -- newer card, check current Modal docs for VRAM
  #   B300          -- newer card, check current Modal docs for VRAM
  #
  # A single gpu_type string requests that many of that type (e.g. "L40S:2"
  # via gpus_per_node: 2 below); num_nodes > 1 additionally requires
  # gpus_per_node to be the FULL device count Modal offers per physical host
  # for that type (see the clustered() note in training/modal_train.py).
  num_nodes: 1
  gpus_per_node: 8
  gpu_type: "L40S"  # 48 GB -- change freely, see the list above

